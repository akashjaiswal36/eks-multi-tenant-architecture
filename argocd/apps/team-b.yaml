apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-a-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/akashjaiswal36/eks-multi-tenant-architecture.git
    targetRevision: HEAD
    path: Namespace-team-b

  destination:
    server: https://kubernetes.default.svc
    namespace: team-b

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true