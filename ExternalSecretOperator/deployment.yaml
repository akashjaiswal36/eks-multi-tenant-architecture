apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: app
          image: nginx
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: username

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: password

            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: host

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: dbname

          volumeMounts:   # ✅ Correct placement
            - name: secret-volume
              mountPath: "/etc/secrets"
              readOnly: true

      volumes:
        - name: secret-volume
          secret:
            secretName: app-secret