apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-a-hpa
  namespace: team-b
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-b
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 45
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70