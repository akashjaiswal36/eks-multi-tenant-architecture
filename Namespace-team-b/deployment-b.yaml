apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  namespace: team-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-b
  template:
    metadata:
      labels:
        app: app-b
      annotations:
        irsa-restart: "v1"
    spec:
      serviceAccountName: team-b-sa
      containers:
      - name: nginx
        image: nginx
        resources:                 # ✅ ADD THIS
          requests:
            cpu: "2m"
            memory: "128Mi"
          limits:
            cpu: "2m"
            memory: "256Mi"
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: nginx-html